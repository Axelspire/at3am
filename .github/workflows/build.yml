name: build

on:
  push:
    branches: [ main ]
    tags: [ 'v*.*.*' ]
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: '^1.26'
          cache: true

      - name: Show Go version
        run: go version

      - name: Run tests
        run: make test

      - name: Build all binaries
        run: make build-all

      - name: Add README to each platform directory
        run: |
          for dir in dist/*/; do
            cp README.md "$dir"
          done

      - name: Create zip archives
        run: |
          cd dist
          for dir in */; do
            dir_name="${dir%/}"
            zip -r "${dir_name}.zip" "$dir_name"
          done
          ls -lh *.zip

      - name: Upload binaries
        uses: actions/upload-artifact@v7
        with:
          name: at3am-binaries
          path: dist/*.zip
          retention-days: 7

  release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download binaries
        uses: actions/download-artifact@v8
        with:
          name: at3am-binaries
          path: dist/

      - name: Create Release and Upload Assets
        uses: ncipollo/release-action@v1
        with:
          artifacts: dist/*.zip
          generateReleaseNotes: true