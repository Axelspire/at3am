name: build

on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '^1.26'
          cache: true

      - name: Show Go version
        run: go version

      - name: Run tests
        run: make test

      - name: Build all binaries
        run: make build-all

      - name: Upload binaries
        uses: actions/upload-artifact@v4
        with:
          name: at3am-binaries
          path: dist/
