name: build

on:
  push:
    branches: [ main ]
    tags: [ 'v*.*.*' ]          # enables automatic releases on tags
  pull_request:
  workflow_dispatch:

permissions:
  contents: write               # corrected for creating releases (write includes read access)

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true   # safe even with updated actions

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: '^1.26'
          cache: true

      - name: Show Go version
        run: go version

      - name: Run tests
        run: make test

      - name: Build all binaries
        run: make build-all

      - name: Upload binaries
        uses: actions/upload-artifact@v7
        with:
          name: at3am-binaries
          path: dist/**
          retention-days: 7

  release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download binaries
        uses: actions/download-artifact@v8
        with:
          name: at3am-binaries
          path: dist/

      - name: Create Release and Upload Assets
        uses: softprops/action-gh-release@v2
        with:
          files: dist/**
          generate_release_notes: true